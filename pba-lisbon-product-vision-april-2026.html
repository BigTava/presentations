# A Better Internet<br/>for Digital Services

<br/>

<small style="opacity: 0.8;">Tiago Tavares &middot; Polkadot Blockchain Academy, Lisbon 2026</small>

Note:
For the next 15 minutes I want to take you on a journey from the user perspective. We're going to walk in the shoes of the people who use digital services every day. Humans. Non-humans. Users with agency, and users without. Agents acting on someone's behalf. Machines acting on their own. The audience for a digital service is wider than we usually think, and the problems we're about to talk about hit all of them.

Our job is to design for every one of those users, not just the ones who click through our onboarding flow.

---

## What is a digital service?

<br/>

Software you rely on to do<br/><span style="color: #E6007A;">something that matters</span>.

Note:
Pick one app you used in the last hour. Gmail, Instagram, Discord, GitHub, Uber, your bank. Who owns it? Who runs the server? Who can change the rules tomorrow? Who can kick you off? Who reads your data?

---

## Internet is great

<div class="text-left">

Productivity tools to organize ideas, text, and media, personal or at work. Excel has over <span style="color: #E6007A;">**750 million**</span> users.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">Microsoft, Ignite 2019 keynote (Rajesh Jha).</small>

Message anyone, anywhere. Stay connected with family and friends. WhatsApp has <span style="color: #E6007A;">**3 billion**</span> monthly active users.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">Meta, Q1 2025 earnings call.</small>

Send money across. PayPal processes over <span style="color: #E6007A;">**$1.5 trillion**</span> a year.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">PayPal Q4 2023 earnings.</small>

</div>

Note:
From first principles: the internet gives every person on earth extraordinary capabilities. We organize our ideas, text, and media — at home and at work. We send messages across the world instantly. We move money across borders. This is the baseline — what the medium itself enables, regardless of who's delivering it.

---

## And agents use it too

<div class="text-center">

![AI, AI agents everywhere](assets/img/ai-ai-agents.jpg)

</div>

*Whatever we build next has to work for them.*

Note:
On the last slide the users were humans. But increasingly, the users of the internet are AI agents — booking flights, buying groceries, summarizing emails, trading tokens. Non-human users with agency, or agents acting on behalf of someone who has it. Whatever we build next has to work for them too.

---

## Internet is Bad

<div class="text-left">

Europe <span style="color: #E6007A;">**€300 billion**</span> EuroStack investment for digital infrastructure.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">EuroStack initiative / Bertelsmann Stiftung, January 2025.</small>

Meta let employees and contractors read E2E WhatsApp messages.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">WhatsApp class action, California federal court, April 2026.</small>

*"Associations Between Screen-Based Media Use and Brain White Matter Integrity in Preschool-Aged Children"*
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">Hutton, Dudley, Horowitz-Kraus, DeWitt & Holland. JAMA Pediatrics 174(1):e193869, 2020.</small>

<span style="color: #E6007A;">**9**</span> of the US largest banks restricted lawful customers accounts.
<small style="font-size: 0.3em; opacity: 0.7; vertical-align: bottom;">Office of the Comptroller of the Currency (OCC) preliminary findings, 2025.</small>

</div>

Note:
Four signals, one direction. Governments are building alternatives because depending on foreign vendors became a national-security risk. Users' most private messages may never have been as private as they were told. The medium we're giving our children is measurably changing their brains. And the supposedly neutral plumbing of money routinely cuts off lawful people for political, religious, or opaque reasons.

None of these are edge cases. They're the shape of the system.

---

## How we access digital services today

<br/>

<pba-cols>
<pba-col>

#### Browser

Type an `https://` URL.

</pba-col>
<pba-col>

#### App

Install it, open it.

</pba-col>
</pba-cols>

Note:
Pause here. Ask the audience: when you open Instagram on your phone, what's actually happening? You tap an icon. Something opens. It shows you a feed. But where does the code come from? Where does the feed come from? Where do your DMs live?

Every digital service today reaches you one of two ways: a URL you type into a browser, or an app you install from a store. Both are thin clients. The browser is rendering JavaScript downloaded from a server somewhere. The app is making API calls to a server somewhere.

---

## Either way, I'm:

<div class="text-left">

- Running **software I can't see**
- On **infrastructure someone else runs**
- **Storing my data/money** where I don't control it

</div>

Note:
In both cases — browser or app — you are running code you can't read, on infrastructure you can't see, and your data lives on disks you don't own.

That's not a bug. That's how the current web was designed. The question we're going to answer in the next few slides is: does it *have* to be that way?

# Can we do better?

---

## Three questions

<div class="text-left">

- Can I run software <span style="color: #E6007A;">**I can see**</span> E2E?
- Can I run the <span style="color: #E6007A;">**infrastructure**</span>, or trust someone who does?
- Can I have <span style="color: #E6007A;">**ownership**</span> over my data/money?

</div>

Note:
Three questions, one for each consequence on the last slide.

If I want software I trust, I need to be able to read it — or at least verify that what's running matches what's published. Today, when Instagram updates, you have no way to know what changed. With the right system, every version of the code is addressable and auditable.

If I'm running on someone else's infrastructure, my service stops when they say it stops. The alternative isn't "everyone runs their own server" — that's impractical. The alternative is a network where many independent operators can serve the same code, and none of them can unilaterally take it down.

And my data — my messages, my files, my identity — should be mine. Not a record in someone's database that I borrow access to. Mine: cryptographically, legally, and practically.

These aren't hypothetical. Every one of these is achievable with technology that exists today. The rest of the talk walks through how.

</svg>

<br/>

*Only one of the three actually lives on-chain.*

Note:
Most "Web3 apps" in 2026 still look like this. Three tiers: a frontend (React/Vite), a backend (indexer, API), and smart contracts.

The frontend ships like any other webapp — it's built and pushed to Vercel, Netlify, or an S3 bucket. Same hosting risk as Web2: one takedown, one TOS change, one domain seizure and your app is gone.

The backend — the indexer, the middleware, the RPC gateway — runs on someone's AWS or GCP account. Same problem.

Only the smart contracts are genuinely on-chain. And if those are on Ethereum L2s, even that depends on sequencers that can (and do) censor.

So "a Web3 app" today means: the logic is verifiable, but 2/3 of the stack still runs on infrastructure controlled by a single party. We have to do better than that.

<rect x="625" y="385" width="230" height="150" rx="8" fill="white" stroke="#333" stroke-width="2"/>
<text x="740" y="450" text-anchor="middle" font-size="18" fill="#222">Local</text>
<text x="740" y="475" text-anchor="middle" font-size="18" fill="#222">Indexing</text>
</svg>

Note:
Now that the deploy story is handled, the frontend itself needs to level up. The UI layer talks to a Cache. The Cache talks to the three subsystems that make a decentralized frontend feel like a native app: **Requests Lifecycle** (managing async calls to chain / host API), **Background Synchronization** (keeping state fresh without blocking the UI), and **Local Indexing** (querying your own local copy of the data instead of hitting a remote indexer). Together, this architecture lets the frontend behave offline-first and stay snappy even when the network is slow.

<text x="940" y="545" text-anchor="middle" font-size="13" fill="#666">DEK sealed with</text>
<text x="940" y="565" text-anchor="middle" font-size="13" fill="#666">Carol's public key</text>

Note:
Two clean steps. **Step 1 (symmetric):** generate a random Data Encryption Key (DEK), encrypt the content with it using AES-256-GCM, upload the encrypted blob to Bulletin Chain. **Step 2 (asymmetric):** for each recipient, encrypt just the DEK with *their* public key (NaCl Box · Curve25519), store the resulting tiny "share" on-chain keyed by (document, recipient). Only the recipient's private key can unwrap the share to recover the DEK, and only then can they fetch and decrypt the content. Content is encrypted once, keys are wrapped cheaply per user — adding or removing a user means adding or removing a share, never re-encrypting the content.

Note:
Two complementary paths. **① Signaling (Statement Store):** peers publish presence, SDP offers, and answers as TTL'd statements on Polkadot. It's async, durable, and trustless — perfect for peer discovery and handshake even if one peer is offline. **② WebRTC (direct):** once the handshake is done, peers open a data channel and do the heavy lifting — Yjs document sync, awareness, cursors — directly, at real-time latency. The two paths coexist: Statement Store stays active for gossip and mesh healing; WebRTC carries the live collaboration traffic. No central server in either path.

<text x="600" y="515" text-anchor="middle" font-size="13" fill="#888">user authority without pulling out the phone for every action</text>
</svg>

Note:
The third pattern. The user's wallet (cold, on their phone) is too precious to reach for on every click. So we derive a **session key** deterministically from their address, fund it once, and let it submit transactions on their behalf. Two modes: **direct** — the session key is registered with the contract and acts as the user's agent (contract verifies `msg.sender`). **MetaTx** — the wallet signs the inner call (preserving authority), the session key just pays fees and submits. Either way, the user signs once for setup, then the product can act without waking the phone. Rotate or revoke the session key anytime by updating the registration on-chain.
